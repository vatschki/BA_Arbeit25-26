ly="sans-serif" font-size="13" lengthAdjust="spacing" textLength="46" x="349" y="645.02">Results</text><polygon fill="#181818" points="186,675.2188,176,679.2188,186,683.2188,182,679.2188" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="180" x2="331" y1="679.2188" y2="679.2188"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="46" x="192" y="674.1528">Results</text><!--MD5=[c4f1e07ae17fd563d37f4009789cd508]
@startuml
actor User
participant UI
participant "Backend Server" as Backend
participant "Python Pipeline" as Pipeline
participant "External LLM" as LLM
database DB

User -> UI: Upload PDF\nEnter Requirements
UI -> Backend: PDF + Requirements

Backend -> Pipeline: Start processing(PDF)

Pipeline -> Pipeline: Parse PDF into\nsemantic text blocks
Pipeline -> Pipeline: Extract first pages\n(e.g. table of contents)

Pipeline -> LLM: LLM Call #1\n(TOC / first pages)
LLM - -> Pipeline: Relevant page numbers

Pipeline -> Pipeline: Filter text blocks\nby relevant pages

Pipeline -> LLM: LLM Call #2\n(Requirements + filtered text blocks)
LLM - -> Pipeline: Structured JSON result

Pipeline -> Backend: JSON result
Backend -> DB: Persist result (Single Source of Truth)

UI -> Backend: Request results
Backend -> DB: Read results
DB - -> Backend: Results
Backend - -> UI: Results
@enduml

